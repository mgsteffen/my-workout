<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Workout Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111;
    --card: #1a1a1a;
    --card2: #222;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --muted: #888;
    --accent: #b8ff4f;
    --push: #ff8c42;
    --pull: #42c8ff;
    --legs: #b57bff;
    --upper: #ff6b8a;
    --hiit: #b8ff4f;
    --done-bg: #1a2e0a;
    --done-text: #b8ff4f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; overflow-x: auto; scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  nav button {
    flex-shrink: 0; padding: 14px 18px;
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: .06em; cursor: pointer; transition: color .15s;
    white-space: nowrap;
  }
  nav button.active { color: var(--text); }
  nav button[data-day="0"].active { border-color: var(--push); color: var(--push); }
  nav button[data-day="1"].active { border-color: var(--pull); color: var(--pull); }
  nav button[data-day="2"].active { border-color: var(--legs); color: var(--legs); }
  nav button[data-day="3"].active { border-color: var(--upper); color: var(--upper); }
  nav button[data-day="4"].active { border-color: var(--hiit); color: var(--hiit); }

  /* ── PANELS ── */
  .panel { display: none; padding: 16px; }
  .panel.active { display: block; }

  /* ── DAY HEADER ── */
  .day-header { margin-bottom: 16px; }
  .day-label { font-size: 22px; font-weight: 600; letter-spacing: -.03em; }
  .day-sub { font-size: 12px; color: var(--muted); margin-top: 3px; font-family: 'DM Mono', monospace; }
  .day-meta { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .pill {
    font-size: 11px; font-family: 'DM Mono', monospace;
    padding: 3px 9px; border-radius: 100px; border: 1px solid var(--border); color: var(--muted);
  }
  .pill.accent { border-color: var(--accent); color: var(--accent); }

  /* ── PROGRESS BAR ── */
  .progress-wrap { margin-bottom: 18px; }
  .progress-track { height: 3px; background: var(--border); border-radius: 2px; }
  .progress-fill { height: 3px; border-radius: 2px; background: var(--accent); width: 0%; transition: width .3s; }
  .progress-label { font-size: 11px; color: var(--muted); margin-top: 5px; font-family: 'DM Mono', monospace; }

  /* ── SUPERSET LABEL ── */
  .ss-label {
    font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: .08em;
    color: var(--push); padding: 6px 12px 2px;
    text-transform: uppercase;
  }
  .ss-label.pull { color: var(--pull); }
  .ss-label.upper-a { color: #ff8c42; }
  .ss-label.upper-b { color: #b57bff; }
  .ss-label.upper-c { color: #ff6b8a; }

  /* ── EXERCISE CARD ── */
  .ex-card {
    background: var(--card); border-radius: 12px;
    margin-bottom: 8px; overflow: hidden;
    border: 1px solid var(--border); transition: border-color .15s;
  }
  .ex-card.done { opacity: .45; }
  .ex-card.done .ex-header { background: var(--done-bg); }

  .ex-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 14px 14px 12px; cursor: pointer;
  }

  /* checkbox */
  .cb {
    width: 24px; height: 24px; border-radius: 6px; border: 1.5px solid var(--border);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all .15s; background: transparent;
  }
  .ex-card.done .cb { background: var(--done-bg); border-color: var(--accent); }
  .check-icon { display: none; }
  .ex-card.done .check-icon { display: block; }
  .uncheck-icon { display: block; }
  .ex-card.done .uncheck-icon { display: none; }

  .ex-main { flex: 1; min-width: 0; }
  .ex-name { font-size: 14px; font-weight: 600; line-height: 1.25; }
  .ex-muscle { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .ex-stats { display: flex; gap: 14px; flex-shrink: 0; }
  .stat { text-align: center; }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); }
  .stat-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 1px; }

  .chevron { color: var(--muted); font-size: 12px; flex-shrink: 0; transition: transform .2s; }
  .ex-card.open .chevron { transform: rotate(180deg); }

  /* ── DETAIL ── */
  .ex-detail {
    display: none; padding: 0 14px 14px 50px;
    border-top: 1px solid var(--border);
  }
  .ex-card.open .ex-detail { display: block; }

  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
    padding: 12px 0 12px;
  }
  .dg-item { }
  .dg-lbl { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: .05em; }
  .dg-val { font-size: 14px; font-weight: 600; margin-top: 2px; }
  .dg-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .detail-note {
    font-size: 13px; color: var(--muted); line-height: 1.6;
    padding-top: 10px; border-top: 1px solid var(--border);
  }

  .yt-link {
    display: inline-block; margin-top: 10px;
    font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: .05em;
    color: var(--muted); text-decoration: none; border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 6px;
  }

  /* ── TIP ── */
  .tip {
    margin-top: 6px; padding: 12px 14px;
    border-radius: 10px; background: var(--card2);
    border-left: 3px solid var(--accent);
    font-size: 12px; color: var(--muted); line-height: 1.6;
  }
  .tip b { color: var(--text); font-weight: 600; }

  /* ── WEEKEND HOME BOX ── */
  .home-box {
    margin-top: 16px; padding: 14px;
    border: 1px dashed var(--border); border-radius: 12px;
  }
  .home-title { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 10px; }
  .home-ex { font-size: 13px; color: var(--muted); line-height: 1.9; }
  .home-ex span { color: var(--text); font-weight: 500; }

  /* ── RESET BUTTON ── */
  .reset-btn {
    display: block; width: 100%; margin-top: 20px; padding: 12px;
    background: transparent; border: 1px solid var(--border); border-radius: 10px;
    color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: .06em; cursor: pointer; text-transform: uppercase;
  }
  .reset-btn:active { background: var(--card2); }
</style>
</head>
<body>

<nav id="nav"></nav>
<div id="panels"></div>

function ytUrl(name) {
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(name + ' exercise form');
}

function buildNav() {
  const nav = document.getElementById('nav');
  const labels = ['MON', 'TUE', 'WED', 'THU', 'FRI'];
  DAYS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.textContent = labels[i];
    btn.dataset.day = i;
    btn.className = i === 0 ? 'active' : '';
    btn.onclick = () => switchDay(i);
    nav.appendChild(btn);
  });
}

function getSsColor(ss) {
  if (!ss) return '';
  if (ss.includes('A')) return 'var(--push)';
  if (ss.includes('B')) return 'var(--legs)';
  if (ss.includes('C')) return 'var(--upper)';
  return 'var(--pull)';
}

function buildPanels() {
  const container = document.getElementById('panels');

  DAYS.forEach((day, di) => {
    const panel = document.createElement('div');
    panel.className = 'panel' + (di === 0 ? ' active' : '');
    panel.id = 'panel-' + di;

    const pillsHtml = day.pills.map(p =>
      `<span class="pill">${p}</span>`
    ).join('');

    let html = `
      <div class="day-header">
        <div class="day-label" style="color:${day.color}">${day.label}</div>
        <div class="day-sub">${day.sub}</div>
        <div class="day-meta">${pillsHtml}</div>
      </div>
      <div class="progress-wrap" id="prog-wrap-${di}">
        <div class="progress-track"><div class="progress-fill" id="prog-${di}"></div></div>
        <div class="progress-label" id="prog-lbl-${di}">0 / ${day.exercises.length} done</div>
      </div>
    `;

    // Track last ss group to avoid duplicate labels
    let lastSs = '';
    day.exercises.forEach((ex, ei) => {
      // Superset label
      if (ex.ss && ex.ss !== lastSs) {
        lastSs = ex.ss;
        html += `<div class="ss-label" style="color:${getSsColor(ex.ss)}">${ex.ss}</div>`;
      } else if (!ex.ss) {
        lastSs = '';
      }

      const badgeHtml = ex.badge
        ? `<span style="font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:4px;background:#0a2e1a;color:var(--accent);border:1px solid var(--accent);margin-left:6px">${ex.badge}</span>`
        : '';

      html += `
        <div class="ex-card" id="card-${di}-${ei}">
          <div class="ex-header" onclick="toggleCard(${di},${ei})">
            <div class="cb" onclick="toggleDone(event,${di},${ei})">
              <svg class="check-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
                <polyline points="2,7 5,10 11,3" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <svg class="uncheck-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
              </svg>
            </div>
            <div class="ex-main">
              <div class="ex-name">${ex.name}${badgeHtml}</div>
              <div class="ex-muscle">${ex.muscle}</div>
            </div>
            <div class="ex-stats">
              <div class="stat">
                <div class="stat-val">${ex.sets}×${ex.reps}</div>
                <div class="stat-lbl">Sets</div>
              </div>
              <div class="stat">
                <div class="stat-val">${ex.rest}</div>
                <div class="stat-lbl">Rest</div>
              </div>
            </div>
            <div class="chevron">▾</div>
          </div>
          <div class="ex-detail">
            <div class="detail-grid">
              <div class="dg-item">
                <div class="dg-lbl">Load</div>
                <div class="dg-val" style="font-size:13px">${ex.load}</div>
                <div class="dg-sub">Starting point</div>
              </div>
              <div class="dg-item">
                <div class="dg-lbl">Rest</div>
                <div class="dg-val" style="font-size:13px">${ex.rest}</div>
                <div class="dg-sub">Between sets</div>
              </div>
              <div class="dg-item">
                <div class="dg-lbl">Est. time</div>
                <div class="dg-val" style="font-size:13px">${ex.time || '~8 min'}</div>
                <div class="dg-sub">Incl. rest</div>
              </div>
            </div>
            <div class="detail-note">${ex.note}</div>
            <a class="yt-link" href="${ytUrl(ex.name)}" target="_blank">▶ Watch on YouTube</a>
          </div>
        </div>
      `;
    });

    html += `<div class="tip"><b>Tip:</b> ${day.tip}</div>`;

    if (day.homeBox) {
      html += `
        <div class="home-box">
          <div class="home-title">Weekend — Home core (15 min, Sat or Sun)</div>
          <div class="home-ex">
            <span>Plank — forearms</span> · 3×45s, rest 30s<br>
            <span>Side plank</span> · 2×30s per side, rest 20s<br>
            <span>Dead bug — slow</span> · 3×8 per side, rest 30s<br>
            <span>Bird dog</span> · 2×10 per side, hold 2s each
          </div>
        </div>
      `;
    }

    html += `<button class="reset-btn" onclick="resetDay(${di})">Reset day</button>`;

    panel.innerHTML = html;
    container.appendChild(panel);
  });
}

function toggleCard(di, ei) {
  const card = document.getElementById(`card-${di}-${ei}`);
  // Close others
  document.querySelectorAll('.ex-card.open').forEach(c => {
    if (c !== card) c.classList.remove('open');
  });
  card.classList.toggle('open');
}

function toggleDone(e, di, ei) {
  e.stopPropagation();
  const card = document.getElementById(`card-${di}-${ei}`);
  card.classList.toggle('done');
  updateProgress(di);
  // save state
  saveState();
}

function updateProgress(di) {
  const day = DAYS[di];
  const total = day.exercises.length;
  const done = document.querySelectorAll(`#panel-${di} .ex-card.done`).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById(`prog-${di}`).style.width = pct + '%';
  document.getElementById(`prog-lbl-${di}`).textContent = `${done} / ${total} done`;
}

function resetDay(di) {
  document.querySelectorAll(`#panel-${di} .ex-card`).forEach(c => c.classList.remove('done', 'open'));
  updateProgress(di);
  saveState();
}

function switchDay(i) {
  document.querySelectorAll('.panel').forEach((p, idx) => p.classList.toggle('active', idx === i));
  document.querySelectorAll('nav button').forEach((b, idx) => b.classList.toggle('active', idx === i));
  document.querySelectorAll('.ex-card.open').forEach(c => c.classList.remove('open'));
}

// ── Simple localStorage persistence ──
function saveState() {
  const state = {};
  DAYS.forEach((d, di) => {
    state[di] = [];
    document.querySelectorAll(`#panel-${di} .ex-card`).forEach((c, ei) => {
      state[di][ei] = c.classList.contains('done');
    });
  });
  try { localStorage.setItem('wk_state', JSON.stringify(state)); } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem('wk_state');
    if (!raw) return;
    const state = JSON.parse(raw);
    Object.entries(state).forEach(([di, arr]) => {
      arr.forEach((done, ei) => {
        if (done) {
          const card = document.getElementById(`card-${di}-${ei}`);
          if (card) card.classList.add('done');
        }
      });
      updateProgress(parseInt(di));
    });
  } catch(e) {}
}

buildNav();
buildPanels();
loadState();
</script>
</body>
</html>
